name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
      administration: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check maintenance mode
        id: maintenance
        run: |
          if [ -f ".maintenance" ]; then
            echo "active=true" >> $GITHUB_OUTPUT
            echo "Maintenance mode is ON — deploying maintenance page."
          else
            echo "active=false" >> $GITHUB_OUTPUT
            echo "Maintenance mode is OFF — deploying normal site."
          fi

      - name: Swap in maintenance page
        if: steps.maintenance.outputs.active == 'true'
        run: cp maintenance.html index.html

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
