name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      maintenance:
        description: 'Maintenance mode'
        required: true
        type: choice
        options:
          - 'no change'
          - enable
          - disable

jobs:
  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Enable maintenance mode
        if: ${{ inputs.maintenance == 'enable' }}
        run: |
          touch .maintenance
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .maintenance
          git diff --cached --quiet || git commit -m "chore: enable maintenance mode"
          git push

      - name: Disable maintenance mode
        if: ${{ inputs.maintenance == 'disable' }}
        run: |
          if [ -f ".maintenance" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git rm .maintenance
            git commit -m "chore: disable maintenance mode"
            git push
          fi

      - name: Swap in maintenance page
        run: |
          if [ -f ".maintenance" ]; then
            echo "Maintenance mode ON"
            cp maintenance.html index.html
          else
            echo "Maintenance mode OFF"
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
